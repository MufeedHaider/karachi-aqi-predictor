name: Daily AQI Model Retrain

on:
  schedule:
    - cron: "0 0 * * *"   # Every day at midnight UTC (5am PKT)
  workflow_dispatch:        # Also allows manual trigger from GitHub UI

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull latest code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Cache pip dependencies (speeds up workflow)
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 5. Fetch fresh data (Open-Meteo + WAQI ground sensor)
      - name: Fetch latest data
        env:
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
        run: python src/fetch_data.py

      # 6. Engineer features
      - name: Run feature engineering
        run: python src/feature_engineering.py

      # 7. Retrain model
      - name: Retrain XGBoost model
        run: python src/train_model.py

      # 8. Generate 72-hour forecast
      - name: Generate 72-hour forecast
        run: python src/forecast_model.py

      # 9. Update SHAP explainability
      - name: Update SHAP analysis
        run: python src/explain_model.py

      # 10. Commit updated models + forecast back to repo
      - name: Commit updated artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/
          git add data/forecast_72hr.csv
          git diff --staged --quiet || git commit -m "Auto-retrain: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push